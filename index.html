<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHIFT AI ジュニア定例ウェビナー レポート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif; background: #F0F4F8; color: #1E2761; }

    /* ヘッダー */
    .hero {
      background: linear-gradient(135deg, #1E2761 0%, #0A1040 100%);
      color: white; padding: 52px 40px 44px; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ""; position: absolute; top: -80px; right: -60px;
      width: 320px; height: 320px; border-radius: 50%;
      background: rgba(0,194,203,0.1);
    }
    .hero::after {
      content: ""; position: absolute; bottom: -60px; right: 160px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,209,102,0.07);
    }
    .hero-tag {
      display: inline-block; background: #00C2CB; color: #1E2761;
      font-weight: 700; font-size: 12px; padding: 4px 14px;
      border-radius: 20px; margin-bottom: 16px; letter-spacing: 0.05em;
    }
    .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
    .hero h1 span { color: #00C2CB; }
    .hero-sub { font-size: 14px; color: #8899BB; }

    /* コンテナ */
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 24px 60px; }

    /* セクションタイトル */
    .section-title {
      font-size: 18px; font-weight: 700; color: #1E2761;
      margin-bottom: 16px; padding-left: 14px;
      border-left: 5px solid #00C2CB;
    }

    /* ウェビナー一覧テーブル */
    .table-wrap {
      background: white; border-radius: 14px;
      box-shadow: 0 2px 12px rgba(30,39,97,0.08);
      overflow: hidden; margin-bottom: 48px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1E2761; }
    thead th {
      color: white; font-size: 12px; font-weight: 600;
      padding: 14px 16px; text-align: left; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid #EEF2F7;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #F7F9FC; }
    tbody td { padding: 16px; font-size: 14px; vertical-align: middle; }

    .td-round {
      font-weight: 700; color: #00C2CB; font-size: 13px;
      white-space: nowrap;
    }
    .td-date { color: #64748B; font-size: 13px; white-space: nowrap; }
    .td-title a {
      color: #1E2761; font-weight: 600; text-decoration: none;
      font-size: 14px; line-height: 1.5;
    }
    .td-title a:hover { color: #00C2CB; text-decoration: underline; }
    .td-title span { color: #1E2761; font-weight: 600; font-size: 14px; line-height: 1.5; }
    .td-speaker { color: #475569; font-size: 13px; white-space: nowrap; }
    .td-num { font-weight: 700; color: #1E2761; text-align: center; }
    .td-rate a {
      display: inline-block;
      background: #EEF2FF; color: #1E2761;
      font-weight: 700; font-size: 13px;
      padding: 4px 12px; border-radius: 20px;
      text-decoration: none; white-space: nowrap;
    }
    .td-rate a:hover { background: #00C2CB; color: white; }
    .td-rate span { color: #94A3B8; font-size: 13px; }
    .td-score {
      text-align: center; font-weight: 700;
      font-size: 16px;
    }
    .stars { color: #FFD166; font-size: 12px; display: block; margin-top: 2px; }
    .no-data { color: #CBD5E1; font-size: 13px; }

    /* スコアの色 */
    .score-high { color: #06D6A0; }
    .score-mid  { color: #FFD166; }
    .score-low  { color: #FF6B6B; }

    /* 累積分析セクション */
    .cumulative-card {
      background: linear-gradient(135deg, #1E2761 0%, #0A1040 100%);
      border-radius: 16px; padding: 36px 32px; color: white;
      position: relative; overflow: hidden;
    }
    .cumulative-card::before {
      content: ""; position: absolute; top: -60px; right: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(0,194,203,0.1);
    }
    .cumulative-card .section-title { color: white; border-color: #FFD166; }
    .cumulative-sub { font-size: 13px; color: #8899BB; margin-bottom: 28px; }

    .cumulative-link {
      display: inline-flex; align-items: center; gap: 10px;
      background: #00C2CB; color: #1E2761;
      font-weight: 700; font-size: 15px;
      padding: 14px 28px; border-radius: 12px;
      text-decoration: none; margin-bottom: 24px;
      transition: opacity 0.2s;
    }
    .cumulative-link:hover { opacity: 0.85; }

    .metrics-preview {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-top: 4px;
    }
    .metric-item {
      background: rgba(255,255,255,0.07); border-radius: 10px;
      padding: 14px 16px; display: flex; align-items: center; gap: 10px;
    }
    .metric-icon { font-size: 20px; flex-shrink: 0; }
    .metric-label { font-size: 12px; color: #8899BB; }

    /* フッター */
    footer { text-align: center; padding: 24px; font-size: 12px; color: #94A3B8; }

    /* レスポンシブ */
    @media (max-width: 700px) {
      .hero h1 { font-size: 22px; }
      thead th, tbody td { padding: 10px 10px; }
      .td-speaker { display: none; }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<div class="hero">
  <div class="hero-tag">SHIFT AI ジュニア</div>
  <h1>ジュニア定例ウェビナー<span>レポート</span>一覧</h1>
  <p class="hero-sub">各回のアンケート集計・分析結果をまとめています</p>
</div>

<div class="container">

  <!-- ウェビナー一覧 -->
  <h2 class="section-title">ウェビナー一覧</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>回数</th>
          <th>日時</th>
          <th>タイトル</th>
          <th>登壇者</th>
          <th>参加人数</th>
          <th>回答率</th>
          <th>満足度</th>
        </tr>
      </thead>
      <tbody id="webinar-list">
        <!-- データはJSで動的に生成 -->
      </tbody>
    </table>
  </div>

  <!-- 累積分析 -->
  <div class="cumulative-card">
    <h2 class="section-title">累積分析データ</h2>
    <p class="cumulative-sub">第1〜12回（全12回）の累計データをグラフで確認できます</p>

    <a href="./累積分析.html" class="cumulative-link">
      📊 累積データ分析を見る →
    </a>

    <div class="metrics-preview">
      <div class="metric-item"><span class="metric-icon">📈</span><span class="metric-label">参加者数推移（全12回）</span></div>
      <div class="metric-item"><span class="metric-icon">📋</span><span class="metric-label">回答率推移（第2〜12回）</span></div>
      <div class="metric-item"><span class="metric-icon">⭐</span><span class="metric-label">満足度推移（第2〜12回）</span></div>
      <div class="metric-item"><span class="metric-icon">🗾</span><span class="metric-label">都道府県別参加者数（上位15）</span></div>
    </div>
  </div>

</div>

<footer>SHIFT AI ジュニア ウェビナーレポート一覧</footer>

<script>
// ===== ウェビナーデータ（全12回・新しい順） =====
const webinars = [
  {

    score: 4.18,
  },
  {
    round: "第11回", date: "2026/03/02",

    notionUrl: "https://www.notion.so/AI-AI-5-2ed80b19aa4a814a88d8d1e73501bcd5?source=copy_link",
    speaker: "平田 研人", participants: 259,
    responseRate: "34%", reportUrl: null, score: 4.33,
  },
  {

    title: "偏差値35でも東大合格！AI×東大思考で暗記地獄を突破するインプット術",
    notionUrl: "https://www.notion.so/2d680b19aa4a8199a9f1dc2ad4800096?source=copy_link",
    speaker: "中村 格", participants: 207,
    responseRate: "37%", reportUrl: null, score: 4.57,
  },
  {
    round: "第9回", date: "2026/02/16",
    title: "【学習×ゲーム制作】問題集を「遊べる教材」に！AIで勉強をハックする次世代学習術",
    notionUrl: "https://www.notion.so/2d680b19aa4a816eaeceeee7215d3f5d?source=copy_link",
    speaker: "福島 麻里子", participants: 127,
    responseRate: "33%", reportUrl: null, score: 4.57,
  },
  {
    round: "第8回", date: "2026/02/09",
    title: "副業で疲弊している親へ　価値を生み出す３つのステップ",
    notionUrl: "https://www.notion.so/2d680b19aa4a817389acd27b90b17678?source=copy_link",
    speaker: "佐藤 元紀", participants: 159,
    responseRate: "16%", reportUrl: null, score: 3.67,
  },
  {
    round: "第7回", date: "2026/02/02",
    title: "AIで「漫画」が作れる！魔法のワークフロー【絵が描けなくても大丈夫】",
    notionUrl: "https://www.notion.so/2d680b19aa4a81999bb7c8b369ed1bc9?source=copy_link",
    speaker: "上洲智樹", participants: 656,
    responseRate: "37%", reportUrl: null, score: 4.58,
  },
  {
    round: "第6回", date: "2026/01/26",
    title: "【保護者必見】わが子の未来を守る！学校×AI教育の新常識",
    notionUrl: "https://www.notion.so/AI-2c680b19aa4a812ab074eb1be079b611?source=copy_link",
    speaker: "Hakushi", participants: 101,
    responseRate: "47%", reportUrl: null, score: 4.77,
  },
  {
    round: "第5回", date: "2026/01/19",
    title: "素人が1時間でプロ級！AI映像制作の裏技【機材ゼロ円で開始】",
    notionUrl: "https://www.notion.so/AI-2c680b19aa4a814fac51fd1fd4c0cef2?source=copy_link",
    speaker: "Hakushi", participants: 762,
    responseRate: "42%", reportUrl: null, score: 4.65,
  },
  {
    round: "第4回", date: "2026/01/12",
    title: "東大生も実践！AIと作る最強勉強スケジュール【誰でも再現可能】",
    notionUrl: "https://www.notion.so/AI-2c680b19aa4a816e9895fb8f0f8875d2?source=copy_link",
    speaker: "Hakushi", participants: 117,
    responseRate: "54%", reportUrl: null, score: 4.81,
  },
  {
    round: "第3回", date: "2026/01/05",
    title: "AIで成績アップ！学校では教えてくれない勉強法【親子で学べる】",
    notionUrl: "https://www.notion.so/AI-2c680b19aa4a819db665ff0bccdfa601?source=copy_link",
    speaker: "Hakushi", participants: 325,
    responseRate: "29%", reportUrl: null, score: 4.77,
  },
  {
    round: "第2回", date: "2025/12/17",
    title: "受験も進路も変わる！中高生の親が今すべきAI教育サポート",
    notionUrl: "https://www.notion.so/AI-2c680b19aa4a81d38c52f56e8859aee5?source=copy_link",
    speaker: "Hakushi", participants: 199,
    responseRate: "34%", reportUrl: null, score: 4.85,
  },
  {
    round: "第1回", date: "2025/12/14",
    title: "AI画像生成、初心者が1時間で"プロ級"になる方法",
    notionUrl: "https://www.notion.so/AI-1-2c680b19aa4a817cbd2cfd689b53a681?source=copy_link",
    speaker: "Hakushi", participants: 424,
    responseRate: null, reportUrl: null, score: null,
  },
];

// スコアに応じてクラスを返す
function scoreClass(s) {
  if (s >= 4.0) return "score-high";
  if (s >= 3.0) return "score-mid";
  return "score-low";
}

// 星を生成（5段階）
function stars(s) {
  const full = Math.round(s);
  return "★".repeat(full) + "☆".repeat(5 - full);
}

// テーブル行を生成
const tbody = document.getElementById("webinar-list");
webinars.forEach(w => {
  const titleCell = w.notionUrl
    ? `<a href="${w.notionUrl}" target="_blank" rel="noopener">${w.title}</a>`
    : `<span>${w.title}</span>`;

  const rateCell = w.reportUrl
    ? `<a href="${w.reportUrl}" target="_blank" rel="noopener">${w.responseRate} →</a>`
    : w.responseRate
      ? `<span>${w.responseRate}</span>`
      : `<span class="no-data">−</span>`;

  const scoreCell = w.score !== null
    ? `<span class="${scoreClass(w.score)}">${w.score.toFixed(2)}</span><span class="stars">${stars(w.score)}</span>`
    : `<span class="no-data">−</span>`;

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="td-round">${w.round}</td>
    <td class="td-date">${w.date}</td>
    <td class="td-title">${titleCell}</td>
    <td class="td-speaker">${w.speaker}</td>
    <td class="td-num">${w.participants.toLocaleString()}<span style="font-size:11px;color:#94A3B8;font-weight:400;">名</span></td>
    <td class="td-rate">${rateCell}</td>
    <td class="td-score">${scoreCell}</td>
  `;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
